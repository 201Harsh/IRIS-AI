version: 2
updates:
  # Scan NPM dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 2 # CRITICAL: Stops the bot from opening 7 PRs at once
    groups:
      npm-updates: # CRITICAL: Groups all NPM package updates into ONE single PR
        patterns:
          - '*'

  # Scan GitHub Actions workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1 # Only allow 1 action update PR at a time
